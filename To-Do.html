<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="To-Do.css" />
    <script src="To-Do.js" defer></script>
    <title>Todo</title>
  </head>
  <body>
    <section class="todo">
      <h2>To-do list</h2>
      <div class="input">
        <input
          type="text"
          class="input-field"
          id="todoInput"
          placeholder="Add a new todo"
        />
        <button class="btn">Add</button>
      </div>
      <ul class="scroll">
        <li id="todoList"></li>
      </ul>
      <div>
        <hr class="counter" />
        <div class="counter-container">
          <div>
            <p><span id="todoDone">0</span> items done</p>
            <p><span id="todoCount">0</span> items total</p>
          </div>

          <div>
            <button id="deleteButton">Delete</button>
            <button id="deleteAllButton">Delete All</button>
          </div>
        </div>
      </div>
    </section>
    <footer>
      <div class="footer">
        <p class="made-by">Made By</p>
        <p class="author">LaPetiteNea</p>
      </div>
    </footer>
  </body>
</html>
